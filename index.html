<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>오늘의 크로스 정책 안내</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#f7f1e6; --ink:#1b130a; --sub:#6b5d47; --muted:#8e8265; --rule:#d9cdb1; --gold:#b8893d; }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#12100b; --ink:#f1e9d6; --sub:#b7ab91; --muted:#7e7359; --rule:#3a3327; --gold:#d4a45d; }
    }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; }
    body {
      background: var(--bg); color: var(--ink);
      font-family: 'Noto Serif KR', serif; line-height: 1.85;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    main { max-width: 480px; padding: 56px 24px; text-align: center; }
    .eyebrow { font-size: 11px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; }
    h1 { font-size: 32px; letter-spacing: -0.6px; margin: 8px 0 24px; font-weight: 400; }
    .meta { font-size: 12px; color: var(--muted); letter-spacing: 1px; margin-bottom: 32px; }
    .links { display: flex; flex-direction: column; gap: 12px; margin-top: 24px; }
    a.tile {
      display: block; padding: 18px 16px; border: 0.6px solid var(--rule); border-radius: 4px;
      color: var(--ink); text-decoration: none; transition: border-color 0.2s;
    }
    a.tile:hover { border-color: var(--gold); }
    a.tile .label { display: block; font-size: 11px; color: var(--gold); letter-spacing: 2px; margin-bottom: 4px; }
    a.tile .name { font-size: 16px; }
    .footer { margin-top: 56px; font-size: 11px; color: var(--muted); letter-spacing: 1px; }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">Daily Golden Cross Signals</div>
    <h1>오늘의 크로스 정책 안내</h1>
    <div class="meta">© 2026 Hasegi Inc.</div>
    <div class="links">
      <a class="tile" href="./terms/"><span class="label">Terms</span><span class="name">이용약관</span></a>
      <a class="tile" href="./privacy/"><span class="label">Privacy</span><span class="name">개인정보 처리방침</span></a>
    </div>
    <div class="footer">문의 hasegi.cs@gmail.com</div>
  </main>
</body>
</html>
